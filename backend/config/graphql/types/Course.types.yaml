Course:
    type: object
    config:
        description: "A course entity"
        fields:
            id:
                type: "Int!"
            code:
                type: "String!"
            active:
                type: "Boolean"
            persmax:
                type: "Int"
            persmin:
                type: "Int"
            isconfirmed:
                type: "Boolean"
            start:
                type: "String"
                resolve: "@=value.start != null ? value.start.format('Y-m-d H:i:s') : null"
            end:
                type: "String"
                resolve: "@=value.end != null ? value.end.format('Y-m-d H:i:s') : null"
            cancelled:
                type: "String"
                resolve: "@=value.cancelled != null ? value.cancelled.format('Y-m-d H:i:s') : null"
            createdAt:
                type: "String"
                resolve: "@=value.createdAt != null ? value.createdAt.format('Y-m-d H:i:s') : null"
            updatedAt:
                type: "String"
                resolve: "@=value.updatedAt != null ? value.updatedAt.format('Y-m-d H:i:s') : null"

CourseConnection:
    type: object
    config:
        description: "Paginated course results"
        fields:
            items:
                type: "[Course!]!"
            totalCount:
                type: "Int!"
            hasNextPage:
                type: "Boolean!"
